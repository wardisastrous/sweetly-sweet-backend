spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/sweetlysweet
    username: sweetuser
    password: sweet1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: your@gmail.com
    password: your-gmail-app-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: sweetlysweet-super-secret-jwt-key-minimum-32-chars-long!!
    expiration: 86400000

cloudinary:
  cloud-name: your-cloud-name
  api-key: your-api-key
  api-secret: your-api-secret

razorpay:
  key-id: rzp_test_XXXXXXXXXXXXXXXX
  key-secret: your-razorpay-secret

server:
  port: 8080